          name: page_cursor
          required: false
          schema:
            $ref: '#/components/schemas/PaginationCursor'
        - in: query
          name: search_url_only
          required: false
          schema:
            type: boolean
        - in: query
          name: search_title_only
          required: false
          schema:
            type: boolean
        - in: query
          name: search_term
          required: false
          schema:
            type: string
        - description: 'If true, then only show posts with no comments'
          in: query
          name: no_comments_only
          required: false
          schema:
            type: boolean
        - description: Whether to automatically mark fetched posts as read.
          in: query
          name: mark_as_read
          required: false
          schema:
            type: boolean
        - description: 'If false, then show posts with media attached (even if your user setting is to hide them)'
          in: query
          name: hide_media
          required: false
          schema:
            type: boolean
        - description: 'If true, then show the nsfw posts (even if your user setting is to hide them)'
          in: query
          name: show_nsfw
          required: false
          schema:
            type: boolean
        - description: 'If true, then show the read posts (even if your user setting is to hide them)'
          in: query
          name: show_read
          required: false
          schema:
            type: boolean
        - in: query
          name: show_hidden
          required: false
          schema:
            type: boolean
