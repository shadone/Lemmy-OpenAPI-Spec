          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedResponse_ReportCombinedView_'
      summary: List user reports.
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - description: 'If true, view all your created reports. Works for non-admins/mods also.'
          in: query
          name: my_reports_only
          required: false
          schema:
            type: boolean
        - description: 'Only for admins: also show reports with `violates_instance_rules=false`'
          in: query
          name: show_community_rule_violations
          required: false
          schema:
            type: boolean
        - in: query
          name: limit
          required: false
          schema:
            format: int64
            type: integer
        - in: query
          name: page_cursor
          required: false
          schema:
            $ref: '#/components/schemas/PaginationCursor'
        - description: 'if no community is given, it returns reports for all communities moderated by the auth user'
          in: query
          name: community_id
          required: false
          schema:
            $ref: '#/components/schemas/CommunityId'
        - description: Filter by the post id. Can return either comment or post reports.
          in: query
          name: post_id
          required: false
          schema:
            $ref: '#/components/schemas/PostId'
        - description: Filter the type of report.
          in: query
          name: type_
          required: false
          schema:
            $ref: '#/components/schemas/ReportType'
        - description: Only shows the unresolved reports
          in: query
          name: unresolved_only
          required: false
          schema:
            type: boolean
