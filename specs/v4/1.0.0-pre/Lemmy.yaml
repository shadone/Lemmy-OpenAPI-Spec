info:
  title: Lemmy client API
  version: 1.0.0-pre
  description: (unofficial) OpenAPI spec for the Lemmy /api/v4 client API (Lemmy 1.0). Vendored from the official lemmy-js-client tsoa output and patched via an OpenAPI Overlay. See specs/v4/<version>/SOURCE.md for provenance.
  license:
    name: BSD 2-Clause
    url: 'https://opensource.org/licenses/BSD-2-Clause'
  contact:
    name: Dessalines
    url: 'https://github.com/shadone/Lemmy-OpenAPI-Spec'
    email: denis@ddenis.info
paths:
  /api/v4/site:
    get:
      operationId: GetSite
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetSiteResponse'
      summary: 'Gets the site, and your user data.'
      tags:
        - Site
      security:
        - bearerAuth: []
        - {}
      parameters: []
    post:
      operationId: CreateSite
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteResponse'
      summary: Create your site.
      tags:
        - Site
      security:
        - bearerAuth: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSite'
