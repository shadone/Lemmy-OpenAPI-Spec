  /api/v4/modlog:
    get:
      operationId: GetModlog
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedResponse_ModlogView_'
      summary: Get the modlog.
      tags:
        - Miscellaneous
      security:
        - bearerAuth: []
        - {}
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            format: int64
            type: integer
        - in: query
          name: page_cursor
          required: false
          schema:
            $ref: '#/components/schemas/PaginationCursor'
        - description: Return only child entries triggered by this parent modlog action.
          in: query
          name: bulk_action_parent_id
          required: false
          schema:
            $ref: '#/components/schemas/ModlogId'
        - description: 'When `true` show all. When `false` or `None`, hide bulk actions (default).'
          in: query
          name: show_bulk
          required: false
          schema:
            type: boolean
        - description: Filter by comment.
          in: query
          name: comment_id
          required: false
          schema:
            $ref: '#/components/schemas/CommentId'
        - description: Filter by post. Will include comments of that post.
          in: query
          name: post_id
          required: false
          schema:
            $ref: '#/components/schemas/PostId'
        - description: Filter by the other / modded person.
          in: query
          name: other_person_id
          required: false
          schema:
            $ref: '#/components/schemas/PersonId'
        - description: |-
            Filter by listing type. When not using All, it will remove the non-community modlog entries,
            such as site bans, instance blocks, adding an admin, etc.
          in: query
          name: listing_type
          required: false
          schema:
            $ref: '#/components/schemas/ListingType'
        - description: Filter by the modlog action type.
          in: query
          name: type_
          required: false
          schema:
            $ref: '#/components/schemas/ModlogKindFilter'
        - description: Filter by the community.
          in: query
          name: community_id
          required: false
          schema:
            $ref: '#/components/schemas/CommunityId'
        - description: Filter by the moderator.
          in: query
          name: mod_person_id
          required: false
          schema:
            $ref: '#/components/schemas/PersonId'
  /api/v4/search:
    get:
      operationId: Search
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
      summary: 'Search lemmy. If `search_term` is a url it also attempts to fetch it, just like `resolve_object`.'
      tags:
        - Miscellaneous
      security:
        - bearerAuth: []
        - {}
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            format: int64
            type: integer
        - description: 'If true, then show the nsfw posts (even if your user setting is to hide them)'
          in: query
          name: show_nsfw
          required: false
          schema:
            type: boolean
        - in: query
          name: post_url_only
          required: false
          schema:
            type: boolean
        - in: query
          name: title_only
          required: false
          schema:
            type: boolean
        - in: query
          name: listing_type
          required: false
          schema:
            $ref: '#/components/schemas/ListingType'
        - description: |-
            Filter to within a given time range, in seconds.
            IE 60 would give results for the past minute.
          in: query
          name: time_range_seconds
          required: false
          schema:
            format: int64
            type: integer
        - in: query
          name: type_
          required: false
          schema:
            $ref: '#/components/schemas/SearchType'
        - in: query
          name: creator_username
          required: false
          schema:
            type: string
        - in: query
          name: creator_id
          required: false
          schema:
            $ref: '#/components/schemas/PersonId'
        - in: query
          name: community_name
          required: false
          schema:
            type: string
        - in: query
          name: community_id
          required: false
          schema:
            $ref: '#/components/schemas/CommunityId'
        - description: |-
            The search query. Can be a plain text, or an object ID which will be resolved
            (eg `https://lemmy.world/comment/1` or `!fediverse@lemmy.ml`).
          in: query
          name: search_term
          required: true
          schema:
            type: string
