openapi: 3.0.0
components:
  examples: {}
  headers: {}
  parameters: {}
  requestBodies: {}
  responses: {}
  schemas:
    SiteId:
      type: integer
      format: int64
      description: The site id.
    DbUrl:
      type: string
    InstanceId:
      type: integer
      format: int64
      description: The instance id.
    Site:
      properties:
        content_warning:
          type: string
          description: |-
            If present, nsfw content is visible by default. Should be displayed by frontends/clients
            when the site is first opened by a user.
        instance_id:
          $ref: '#/components/schemas/InstanceId'
        inbox_url:
          $ref: '#/components/schemas/DbUrl'
          description: The site inbox
        last_refreshed_at:
          type: string
          description: The time the site was last refreshed.
        ap_id:
          $ref: '#/components/schemas/DbUrl'
          description: The federated ap_id.
        summary:
          type: string
          description: 'A shorter, one-line summary of the site.'
        banner:
          $ref: '#/components/schemas/DbUrl'
          description: A banner url.
        icon:
          $ref: '#/components/schemas/DbUrl'
          description: An icon URL.
        updated_at:
          type: string
        published_at:
          type: string
        sidebar:
          type: string
          description: A sidebar for the site in markdown.
        name:
          type: string
        id:
          $ref: '#/components/schemas/SiteId'
      required:
        - instance_id
        - inbox_url
        - last_refreshed_at
        - ap_id
        - published_at
        - name
        - id
      type: object
      description: |-
        Additional data for federated instances. This may be missing for other platforms which are not
        fully compatible. Basic data is guaranteed to be available via [[Instance]].
    LocalSiteId:
      type: integer
      format: int64
      description: The local site id.
    ListingType:
      type: string
      enum:
        - all
        - local
        - subscribed
        - moderator_view
        - suggested
      description: A listing type for post and comment list fetches.
    RegistrationMode:
      type: string
      enum:
        - closed
        - require_application
        - open
      description: The registration mode for your site. Determines what happens after a user signs up.
    PostListingMode:
      type: string
      enum:
        - list
        - card
        - small_card
      description: A post-view mode that changes how multiple post listings look.
    PostSortType:
      type: string
      enum:
        - active
        - hot
        - new
        - old
        - top
        - most_comments
        - new_comments
        - controversial
        - scaled
      description: 'The post sort types. See here for descriptions: https://join-lemmy.org/docs/en/users/03-votes-and-ranking.html'
    CommentSortType:
      type: string
      enum:
        - hot
        - top
        - new
        - old
        - controversial
      description: 'The comment sort types. See here for descriptions: https://join-lemmy.org/docs/en/users/03-votes-and-ranking.html'
    FederationMode:
      type: string
      enum:
        - all
        - local
        - disable
      description: The federation mode for an item
    MultiCommunityId:
      type: integer
      format: int64
    ImageMode:
      type: string
      enum:
        - none
        - store_link_previews
        - proxy_all_images
      description: A mode for setting how pictrs handles images.
    LocalSite:
      properties:
        image_upload_disabled:
          type: boolean
        image_allow_video_uploads:
          type: boolean
          description: 'This affects post and comment images, but not avatars and banners.'
        image_max_upload_size:
          type: integer
          format: int64
          description: 'This affects post and comment images, but not avatar and banner sizes.'
        image_max_banner_size:
          type: integer
          format: int64
        image_max_avatar_size:
          type: integer
          format: int64
        image_max_thumbnail_size:
          type: integer
          format: int64
          description: These are pixel sizes. Larger images are automatically downscaled.
        image_upload_timeout_seconds:
          type: integer
          format: int64
        image_proxy_bypass_domains:
          type: string
          description: |-
            Allows bypassing proxy for specific image hosts when using [[ImageMode.ProxyAllImages]]. Use
            a comma-delimited string.

            Example: i.imgur.com,postimg.cc
        image_mode:
          $ref: '#/components/schemas/ImageMode'
          description: A mode for setting how pictrs handles images.
        default_items_per_page:
          type: integer
          format: int64
        suggested_multi_community_id:
          $ref: '#/components/schemas/MultiCommunityId'
        email_notifications_disabled:
          type: boolean
          description: 'Dont send email notifications to users for new replies, mentions etc'
        users_active_half_year:
          type: integer
          format: int64
          description: The number of users with any activity in the last half year.
        users_active_month:
          type: integer
          format: int64
          description: The number of users with any activity in the last month.
        users_active_week:
          type: integer
          format: int64
          description: The number of users with any activity in the last week.
        users_active_day:
          type: integer
          format: int64
          description: The number of users with any activity in the last day.
        communities:
          type: integer
          format: int64
        comments:
          type: integer
          format: int64
        posts:
          type: integer
          format: int64
        users:
          type: integer
          format: int64
        nsfw_content_disallowed:
          type: boolean
          description: Block NSFW content being created
        default_post_time_range_seconds:
          type: integer
          format: int64
          description: 'A default time range limit to apply to post sorts, in seconds.'
        comment_downvotes:
          $ref: '#/components/schemas/FederationMode'
          description: What kind of comment downvotes your site allows.
        comment_upvotes:
          $ref: '#/components/schemas/FederationMode'
          description: What kind of comment upvotes your site allows.
        post_downvotes:
          $ref: '#/components/schemas/FederationMode'
          description: What kind of post downvotes your site allows.
        post_upvotes:
          $ref: '#/components/schemas/FederationMode'
          description: What kind of post upvotes your site allows.
        oauth_registration:
          type: boolean
          description: Whether or not external auth methods can auto-register users.
        default_comment_sort_type:
          $ref: '#/components/schemas/CommentSortType'
          description: 'Default value for [LocalUser.comment_sort_type]'
        default_post_sort_type:
          $ref: '#/components/schemas/PostSortType'
          description: 'Default value for [LocalUser.post_sort_type]'
        default_post_listing_mode:
          $ref: '#/components/schemas/PostListingMode'
          description: 'Default value for [LocalSite.post_listing_mode]'
        federation_signed_fetch:
          type: boolean
          description: |-
            Whether to sign outgoing Activitypub fetches with private key of local instance. Some
            Fediverse instances and platforms require this.
        reports_email_admins:
          type: boolean
          description: Whether to email admins on new reports.
        registration_mode:
          $ref: '#/components/schemas/RegistrationMode'
        updated_at:
          type: string
        published_at:
          type: string
        federation_enabled:
          type: boolean
          description: Whether federation is enabled.
        slur_filter_regex:
          type: string
          description: An optional regex to filter words.
        application_email_admins:
          type: boolean
          description: Whether new applications email admins.
        legal_information:
          type: string
          description: An optional legal disclaimer page.
        default_post_listing_type:
          $ref: '#/components/schemas/ListingType'
        default_theme:
          type: string
          description: The default front-end theme.
        private_instance:
          type: boolean
          description: Whether the instance is private or public.
        application_question:
          type: string
          description: An optional registration application questionnaire in markdown.
        email_verification_required:
          type: boolean
          description: Whether emails are required.
        community_creation_admin_only:
          type: boolean
          description: Whether only admins can create communities.
        site_setup:
          type: boolean
          description: True if the site is set up.
        site_id:
          $ref: '#/components/schemas/SiteId'
        id:
          $ref: '#/components/schemas/LocalSiteId'
      required:
        - image_upload_disabled
        - image_allow_video_uploads
        - image_max_upload_size
        - image_max_banner_size
        - image_max_avatar_size
        - image_max_thumbnail_size
        - image_upload_timeout_seconds
        - image_mode
        - default_items_per_page
        - email_notifications_disabled
        - users_active_half_year
        - users_active_month
        - users_active_week
        - users_active_day
        - communities
        - comments
        - posts
        - users
        - nsfw_content_disallowed
        - comment_downvotes
        - comment_upvotes
        - post_downvotes
        - post_upvotes
        - oauth_registration
        - default_comment_sort_type
        - default_post_sort_type
        - default_post_listing_mode
        - federation_signed_fetch
        - reports_email_admins
        - registration_mode
        - published_at
        - federation_enabled
        - application_email_admins
        - default_post_listing_type
        - default_theme
        - private_instance
        - email_verification_required
        - community_creation_admin_only
        - site_setup
        - site_id
        - id
      type: object
      description: The local site.
    LocalSiteRateLimit:
      properties:
        import_user_settings_interval_seconds:
          type: integer
          format: int64
        import_user_settings_max_requests:
          type: integer
          format: int64
        updated_at:
          type: string
        published_at:
          type: string
        search_interval_seconds:
          type: integer
          format: int64
        search_max_requests:
          type: integer
          format: int64
        comment_interval_seconds:
          type: integer
          format: int64
        comment_max_requests:
          type: integer
          format: int64
        image_interval_seconds:
          type: integer
          format: int64
        image_max_requests:
          type: integer
          format: int64
        register_interval_seconds:
          type: integer
          format: int64
        register_max_requests:
          type: integer
          format: int64
        post_interval_seconds:
          type: integer
          format: int64
        post_max_requests:
          type: integer
          format: int64
        message_interval_seconds:
          type: integer
          format: int64
        message_max_requests:
          type: integer
          format: int64
        local_site_id:
          $ref: '#/components/schemas/LocalSiteId'
      required:
        - import_user_settings_interval_seconds
        - import_user_settings_max_requests
        - published_at
        - search_interval_seconds
        - search_max_requests
        - comment_interval_seconds
        - comment_max_requests
        - image_interval_seconds
        - image_max_requests
        - register_interval_seconds
        - register_max_requests
        - post_interval_seconds
        - post_max_requests
        - message_interval_seconds
        - message_max_requests
        - local_site_id
      type: object
      description: Rate limits for your site. Given in count / length of time.
    Instance:
      properties:
        version:
          type: string
          description: The version of the instance's software.
        software:
          type: string
          description: The software of the instance.
        updated_at:
          type: string
          description: When the instance was updated.
        published_at:
          type: string
        domain:
          type: string
        id:
          $ref: '#/components/schemas/InstanceId'
      required:
        - published_at
        - domain
        - id
      type: object
      description: |-
        Basic data about a Fediverse instance which is available for every known domain. Additional
        data may be available in [[Site]].
    SiteView:
      properties:
        instance:
          $ref: '#/components/schemas/Instance'
        local_site_rate_limit:
          $ref: '#/components/schemas/LocalSiteRateLimit'
        local_site:
          $ref: '#/components/schemas/LocalSite'
        site:
          $ref: '#/components/schemas/Site'
      required:
        - instance
        - local_site_rate_limit
        - local_site
        - site
      type: object
      description: A site view.
    PersonId:
      type: integer
      format: int64
      description: The person id.
    Person:
      properties:
        comment_count:
          type: integer
          format: int64
        post_count:
          type: integer
          format: int64
        instance_id:
          $ref: '#/components/schemas/InstanceId'
        bot_account:
          type: boolean
          description: Whether the person is a bot account.
        matrix_user_id:
          type: string
          description: 'A matrix id, usually given an'
        deleted:
          type: boolean
          description: Whether the person is deleted.
        banner:
          $ref: '#/components/schemas/DbUrl'
          description: A URL for a banner.
        last_refreshed_at:
          type: string
        local:
          type: boolean
          description: Whether the person is local to our site.
        bio:
          type: string
          description: 'An optional bio, in markdown.'
        ap_id:
          $ref: '#/components/schemas/DbUrl'
          description: The federated ap_id.
        updated_at:
          type: string
        published_at:
          type: string
        avatar:
          $ref: '#/components/schemas/DbUrl'
          description: A URL for an avatar.
        display_name:
          type: string
          description: A shorter display name.
        name:
          type: string
        id:
          $ref: '#/components/schemas/PersonId'
      required:
        - comment_count
        - post_count
        - instance_id
        - bot_account
        - deleted
        - last_refreshed_at
        - local
        - ap_id
        - published_at
        - name
        - id
      type: object
      description: A person.
    PersonActions:
      properties:
        downvotes:
          type: integer
          format: int64
          description: A total of downvotes given to this person
        upvotes:
          type: integer
          format: int64
          description: A total of upvotes given to this person
        voted_at:
          type: string
          description: When the person was voted on.
        note:
          type: string
          description: A note about the person.
        noted_at:
          type: string
          description: When the person was noted.
        blocked_at:
          type: string
          description: When the person was blocked.
      type: object
    PersonView:
      properties:
        ban_expires_at:
          type: string
        banned:
          type: boolean
        person_actions:
          $ref: '#/components/schemas/PersonActions'
        is_admin:
          type: boolean
        person:
          $ref: '#/components/schemas/Person'
      required:
        - banned
        - is_admin
        - person
      type: object
      description: A person view.
    LanguageId:
      type: integer
      format: int64
      description: The language id.
    Language:
      properties:
        name:
          type: string
        code:
          type: string
        id:
          $ref: '#/components/schemas/LanguageId'
      required:
        - name
        - code
        - id
      type: object
      description: A language.
    TaglineId:
      type: integer
      format: int64
      description: The tagline id.
    Tagline:
      properties:
        updated_at:
          type: string
        published_at:
          type: string
        content:
          type: string
        id:
          $ref: '#/components/schemas/TaglineId'
      required:
        - published_at
        - content
        - id
      type: object
      description: 'A tagline, shown at the top of your site.'
    OAuthProviderId:
      type: integer
      format: int64
      description: The oauth provider id.
    PublicOAuthProvider:
      properties:
        use_pkce:
          type: boolean
          description: switch to enable or disable PKCE
        scopes:
          type: string
          description: |-
            Lists the scopes requested from users. Users will have to grant access to the requested scope
            at sign up.
        client_id:
          type: string
          description: |-
            The client_id is provided by the OAuth 2.0 provider and is a unique identifier to this
            service
        authorization_endpoint:
          type: string
          description: |-
            The authorization endpoint is used to interact with the resource owner and obtain an
            authorization grant. This is usually provided by the OAUTH provider.
        display_name:
          type: string
          description: The OAuth 2.0 provider name displayed to the user on the Login page
        id:
          $ref: '#/components/schemas/OAuthProviderId'
      required:
        - use_pkce
        - scopes
        - client_id
        - authorization_endpoint
        - display_name
        - id
      type: object
    AdminOAuthProvider:
      properties:
        use_pkce:
          type: boolean
          description: switch to enable or disable PKCE
        updated_at:
          type: string
        published_at:
          type: string
        enabled:
          type: boolean
          description: switch to enable or disable an oauth provider
        account_linking_enabled:
          type: boolean
          description: Allows linking an OAUTH account to an existing user account by matching emails
        auto_verify_email:
          type: boolean
          description: Automatically sets email as verified on registration
        scopes:
          type: string
          description: |-
            Lists the scopes requested from users. Users will have to grant access to the requested scope
            at sign up.
        client_id:
          type: string
          description: |-
            The client_id is provided by the OAuth 2.0 provider and is a unique identifier to this
            service
        id_claim:
          type: string
          description: |-
            The OAuth 2.0 claim containing the unique user ID returned by the provider. Usually this
            should be set to "sub".
        userinfo_endpoint:
          type: string
          description: |-
            The UserInfo Endpoint is an OAuth 2.0 Protected Resource that returns Claims about the
            authenticated End-User. This is defined in the OIDC specification.
        token_endpoint:
          type: string
          description: |-
            The token endpoint is used by the client to obtain an access token by presenting its
            authorization grant or refresh token. This is usually provided by the OAUTH provider.
        authorization_endpoint:
          type: string
          description: |-
            The authorization endpoint is used to interact with the resource owner and obtain an
            authorization grant. This is usually provided by the OAUTH provider.
        issuer:
          type: string
          description: The issuer url of the OAUTH provider.
        display_name:
          type: string
          description: The OAuth 2.0 provider name displayed to the user on the Login page
        id:
          $ref: '#/components/schemas/OAuthProviderId'
      required:
        - use_pkce
        - published_at
        - enabled
        - account_linking_enabled
        - auto_verify_email
        - scopes
        - client_id
        - id_claim
        - userinfo_endpoint
        - token_endpoint
        - authorization_endpoint
        - issuer
        - display_name
        - id
      type: object
      description: oauth provider with client_secret - should never be sent to the client
    LocalSiteUrlBlocklist:
      properties:
        updated_at:
          type: string
        published_at:
          type: string
        url:
          type: string
        id:
          type: integer
          format: int64
      required:
        - published_at
        - url
        - id
      type: object
    PluginMetadata:
      properties:
        description:
          type: string
        url:
          type: string
        name:
          type: string
      required:
        - name
      type: object
    GetSiteResponse:
      properties:
        captcha_enabled:
          type: boolean
        last_application_duration_seconds:
          type: integer
          format: int64
          description: |-
            The number of seconds between the last application published, and approved / denied time.

            Useful for estimating when your application will be approved.
        active_plugins:
          items:
            $ref: '#/components/schemas/PluginMetadata'
          type: array
        blocked_urls:
          items:
            $ref: '#/components/schemas/LocalSiteUrlBlocklist'
          type: array
        admin_oauth_providers:
          items:
            $ref: '#/components/schemas/AdminOAuthProvider'
          type: array
        oauth_providers:
          items:
            $ref: '#/components/schemas/PublicOAuthProvider'
          type: array
          description: A list of external auth methods your site supports.
        tagline:
          $ref: '#/components/schemas/Tagline'
          description: 'If the site has any taglines, a random one is included here for displaying'
        discussion_languages:
          items:
            $ref: '#/components/schemas/LanguageId'
          type: array
        all_languages:
          items:
            $ref: '#/components/schemas/Language'
          type: array
        version:
          type: string
        admins:
          items:
            $ref: '#/components/schemas/PersonView'
          type: array
        site_view:
          $ref: '#/components/schemas/SiteView'
      required:
        - captcha_enabled
        - active_plugins
        - blocked_urls
        - admin_oauth_providers
        - oauth_providers
        - discussion_languages
        - all_languages
        - version
        - admins
        - site_view
      type: object
      description: An expanded response for a site.
    SiteResponse:
      properties:
        site_view:
          $ref: '#/components/schemas/SiteView'
      required:
        - site_view
      type: object
      description: The response for a site.
    CreateSite:
      properties:
        image_upload_disabled:
          type: boolean
        image_allow_video_uploads:
          type: boolean
        image_max_upload_size:
          type: integer
          format: int64
        image_max_banner_size:
          type: integer
          format: int64
        image_max_avatar_size:
          type: integer
          format: int64
        image_max_thumbnail_size:
          type: integer
          format: int64
        image_upload_timeout_seconds:
          type: integer
          format: int64
        image_proxy_bypass_domains:
          type: string
        image_mode:
          $ref: '#/components/schemas/ImageMode'
        suggested_multi_community_id:
          $ref: '#/components/schemas/MultiCommunityId'
        email_notifications_disabled:
          type: boolean
        nsfw_content_disallowed:
          type: boolean
        comment_downvotes:
          $ref: '#/components/schemas/FederationMode'
        comment_upvotes:
          $ref: '#/components/schemas/FederationMode'
        post_downvotes:
          $ref: '#/components/schemas/FederationMode'
        post_upvotes:
          $ref: '#/components/schemas/FederationMode'
        federation_signed_fetch:
          type: boolean
        reports_email_admins:
          type: boolean
        content_warning:
          type: string
        oauth_registration:
          type: boolean
        registration_mode:
          $ref: '#/components/schemas/RegistrationMode'
        federation_enabled:
          type: boolean
        rate_limit_import_user_settings_interval_seconds:
          type: integer
          format: int64
        rate_limit_import_user_settings_max_requests:
          type: integer
          format: int64
        rate_limit_search_interval_seconds:
          type: integer
          format: int64
        rate_limit_search_max_requests:
          type: integer
          format: int64
        rate_limit_comment_interval_seconds:
          type: integer
          format: int64
        rate_limit_comment_max_requests:
          type: integer
          format: int64
        rate_limit_image_interval_seconds:
          type: integer
          format: int64
        rate_limit_image_max_requests:
          type: integer
          format: int64
        rate_limit_register_interval_seconds:
          type: integer
          format: int64
        rate_limit_register_max_requests:
          type: integer
          format: int64
        rate_limit_post_interval_seconds:
          type: integer
          format: int64
        rate_limit_post_max_requests:
          type: integer
          format: int64
        rate_limit_message_interval_seconds:
          type: integer
          format: int64
        rate_limit_message_max_requests:
          type: integer
          format: int64
        slur_filter_regex:
          type: string
        discussion_languages:
          items:
            $ref: '#/components/schemas/LanguageId'
          type: array
        application_email_admins:
          type: boolean
        legal_information:
          type: string
        default_comment_sort_type:
          $ref: '#/components/schemas/CommentSortType'
        default_items_per_page:
          type: integer
          format: int64
        default_post_time_range_seconds:
          type: integer
          format: int64
        default_post_sort_type:
          $ref: '#/components/schemas/PostSortType'
        default_post_listing_mode:
          $ref: '#/components/schemas/PostListingMode'
        default_post_listing_type:
          $ref: '#/components/schemas/ListingType'
        default_theme:
          type: string
        private_instance:
          type: boolean
        application_question:
          type: string
        email_verification_required:
          type: boolean
        community_creation_admin_only:
          type: boolean
        summary:
          type: string
        sidebar:
          type: string
        name:
          type: string
      required:
        - name
      type: object
      description: Creates a site. Should be done after first running lemmy.
    EditSite:
      properties:
        image_upload_disabled:
          type: boolean
        image_allow_video_uploads:
          type: boolean
        image_max_upload_size:
          type: integer
          format: int64
        image_max_banner_size:
          type: integer
          format: int64
        image_max_avatar_size:
          type: integer
          format: int64
        image_max_thumbnail_size:
          type: integer
          format: int64
        image_upload_timeout_seconds:
          type: integer
          format: int64
        image_proxy_bypass_domains:
          type: string
          description: |-
